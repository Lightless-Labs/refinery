env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

steps:
  - label: ":rust: Linux ARM64 Rust CI"
    key: rust-linux-arm64
    agents:
      queue: "ci-linux-arm64"
    plugins:
      - github.com/Bande-a-Bonnot/tart-ci#v0.1.1:
          image: "ghcr.io/cirruslabs/ubuntu@sha256:e90dfc9e6dffb742809f32e61ee03daf5fa6ee30e24ee05c105beffa3b7c9540"
          os: "linux"
          always_pull: false
          headless: true
    command: |
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive
      if [[ -z "$${HOME:-}" || "$$HOME" == "/" ]]; then
        export HOME=/home/admin
      fi
      export CARGO_HOME="$$HOME/.cargo"
      export RUSTUP_HOME="$$HOME/.rustup"
      export PATH="$$CARGO_HOME/bin:$$PATH"

      sudo apt-get update
      sudo apt-get install -y --no-install-recommends \
        ca-certificates \
        curl \
        build-essential \
        pkg-config \
        libssl-dev

      if ! command -v cargo >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | HOME="$$HOME" CARGO_HOME="$$CARGO_HOME" RUSTUP_HOME="$$RUSTUP_HOME" sh -s -- -y --profile minimal --no-modify-path
        . "$$CARGO_HOME/env"
      fi

      rustup component add clippy rustfmt
      rustc --version
      cargo --version

      cargo fmt --all -- --check
      cargo clippy --workspace
      cargo test --workspace
      cargo build --workspace --release
