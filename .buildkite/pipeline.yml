env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  BUILDKITE_GIT_FETCH_FLAGS: "-v --prune --tags --force --prune-tags"

steps:
  - label: ":rust: Linux ARM64 Rust CI"
    key: rust-linux-arm64
    agents:
      queue: "ci-linux-arm64"
    plugins:
      - github.com/Bande-a-Bonnot/tart-ci#v0.1.1:
          image: "ci-linux-arm64-rust-bazel"
          os: "linux"
          always_pull: false
          headless: true
    command: |
      set -euo pipefail

      if [[ -z "$${HOME:-}" || "$$HOME" == "/" ]]; then
        export HOME=/home/admin
      fi
      export CARGO_HOME="$${CARGO_HOME:-$$HOME/.cargo}"
      export RUSTUP_HOME="$${RUSTUP_HOME:-/opt/rustup}"
      export PATH="/usr/local/bin:$$CARGO_HOME/bin:$$PATH"

      rustc --version
      cargo --version
      rustfmt --version
      cargo clippy --version
      bazelisk version

      cargo fmt --all -- --check
      cargo clippy --workspace
      cargo test --workspace
      cargo build --workspace --release
